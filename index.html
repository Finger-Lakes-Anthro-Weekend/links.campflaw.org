---
layout: default
---
<picture id="background-img">
    <source type="image/webp" srcset="assets/flaw-background.webp">
    <source type="image/jpeg" srcset="assets/flaw-background.jpg">
    <img class="loaded-fade-in background-blur" onload="this.style.opacity=1" src="assets/flaw-background.jpg"
        alt="blurred photo of a group of fursuiters waving their arms">
</picture>
<div class="d-flex flex-row w-100 h-100 justify-content-center align-items-center vh-100">
    <div
        class="w-95 w-lg-50 w-md-66 d-flex flex-column p-4 align-items-center shadow-lg background-green rounded-5 p-4 gap-3">
        <a href="https://campflaw.org" class="w-33 w-md-25 mb-2 hover-effect big-text-shadow min-w-100">
            <img src="assets/flaw-logo.svg" alt="the F.L.A.W. logo, a white sea serpent swimming in a lake">
        </a>
        {% for link in site.socialLinks %}
        {% include link.html icon=link.icon desc=link.title link=link.link %}
        {% endfor %}
        <div class="scroll-fade"></div>
    </div>
</div>
